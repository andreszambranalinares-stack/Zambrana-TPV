<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zambrana TPV</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B0000">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <!-- Header/Nav -->
    <header id="main-header" class="hidden">
        <button id="btn-back-home" class="btn-icon" aria-label="Volver al inicio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 id="header-title">
            <img src="logo.png" alt="Zambrana TPV" style="height: 28px; vertical-align: middle;">
        </h1>
        <button id="btn-menu" class="btn-icon" aria-label="Menú">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
    </header>

    <!-- Main View Container -->
    <main id="app-container">
        <!-- Views will be injected here -->
    </main>

    <!-- Sidebar Menu -->
    <div id="sidebar-overlay" class="hidden"></div>
    <aside id="sidebar" class="sidebar-hidden">
        <div class="sidebar-header">
            <h2>Configuración</h2>
            <button id="btn-close-menu" class="btn-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">

            <button id="btn-change-role" class="sidebar-item">
                <span class="icon"><i class='bx bx-transfer-alt'></i></span> Cambiar rol
            </button>
            <button id="btn-view-allergens" class="sidebar-item">
                <span class="icon"><i class='bx bx-error'></i></span> Alérgenos de la carta
            </button>
            <button id="btn-toggle-sound" class="sidebar-item">
                <span class="icon"><i class='bx bx-volume-full'></i></span> <span class="text">Sonido activado</span>
            </button>
            <button id="btn-about" class="sidebar-item">
                <span class="icon"><i class='bx bx-info-circle'></i></span> Acerca de
            </button>

            <div id="admin-menu-section">
                <div style="padding: 10px 15px; font-weight: bold; color: var(--color-text-muted); font-size: 0.8rem; margin-top: 10px; border-top: 1px solid var(--color-border);">
                    ── Admin ──
                </div>
                <button id="btn-admin-dashboard" class="sidebar-item admin-item">
                    <span class="icon"><i class='bx bx-cog'></i></span> Panel de Control
                </button>
                <button id="btn-manage-carta" class="sidebar-item admin-item">
                    <span class="icon"><i class='bx bx-book'></i></span> Gestionar Carta
                </button>
                <button id="btn-admin-devices" class="sidebar-item admin-item">
                    <span class="icon"><i class='bx bx-devices'></i></span> Dispositivos
                </button>
            </div>
        </nav>
    </aside>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
